name: Lint and Test Charts

on:
  push:
    paths:
      - "charts/**"
      - "scripts/**"
  pull_request:
    paths:
      - "charts/**"
      - "scripts/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint changed charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

  trivy:
    name: Trivy security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Render charts for scanning
        run: |
          mkdir -p /tmp/rendered
          for chart in charts/*/; do
            name=$(basename "$chart")
            case "$name" in
              mcp-server) helm template test "$chart" --set command="uvx test-server" --output-dir /tmp/rendered ;;
              *)          helm template test "$chart" --output-dir /tmp/rendered 2>/dev/null || true ;;
            esac
          done

      - name: Scan rendered templates (misconfig)
        run: trivy fs --severity MEDIUM,HIGH,CRITICAL --scanners misconfig --ignorefile .trivyignore --exit-code 1 /tmp/rendered

      - name: Scan filesystem (vulns + secrets)
        run: trivy fs --severity MEDIUM,HIGH,CRITICAL --scanners vuln,secret --exit-code 1 .

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck -x -P scripts scripts/*.sh

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version 0.7.2

      - name: Run unit tests
        run: |
          for chart in charts/*/; do
            if [ -d "${chart}tests" ]; then
              echo "==> Testing ${chart}"
              helm unittest "${chart}"
            fi
          done

  install-test:
    runs-on: ubuntu-latest
    needs: [lint, shellcheck, unit-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.1

      - name: Set up Python (for chart-testing)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1

      - name: Install changed charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
