suite: secret
templates:
  - secret.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should render a Secret by default
    asserts:
      - isKind:
          of: Secret

  - it: should set the correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-release-atlassian-secrets

  - it: should include standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: atlassian
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release

  - it: should be of type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain the correct env var keys
    asserts:
      - exists:
          path: data.JIRA_USERNAME
      - exists:
          path: data.JIRA_API_TOKEN
      - exists:
          path: data.CONFLUENCE_USERNAME
      - exists:
          path: data.CONFLUENCE_API_TOKEN

  - it: should base64-encode credential values
    set:
      secrets.jiraUsername: user@example.com
      secrets.jiraToken: my-token
      secrets.confluenceUsername: user@example.com
      secrets.confluenceToken: my-conf-token
    asserts:
      - equal:
          path: data.JIRA_USERNAME
          decodeBase64: true
          value: "user@example.com"
      - equal:
          path: data.JIRA_API_TOKEN
          decodeBase64: true
          value: "my-token"
      - equal:
          path: data.CONFLUENCE_USERNAME
          decodeBase64: true
          value: "user@example.com"
      - equal:
          path: data.CONFLUENCE_API_TOKEN
          decodeBase64: true
          value: "my-conf-token"

  - it: should not render when existingSecret is set
    set:
      secrets.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0
