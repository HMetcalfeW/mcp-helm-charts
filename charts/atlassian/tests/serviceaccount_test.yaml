suite: serviceaccount
templates:
  - serviceaccount.yaml
release:
  name: test-release
  namespace: test-ns
tests:
  - it: should render a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount

  - it: should set the correct default name
    asserts:
      - equal:
          path: metadata.name
          value: test-release-atlassian

  - it: should include standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: atlassian
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release

  - it: should disable automount of service account token
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should not render when creation is disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name when specified
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should include annotations when set
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/my-role"

  - it: should not include annotations key when empty
    asserts:
      - notExists:
          path: metadata.annotations
